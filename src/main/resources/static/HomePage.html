<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>City Library | Home</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('ria-OobxlWxuLaA-unsplash.jpg') no-repeat center center/cover;
            height: 100vh;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        .hero {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: brightness(0.9);
        }

        .search-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .search-box h2 {
            color: #0077b6;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .search-box p {
            margin: 0 0 15px;
            font-size: 0.9em;
            color: #444;
        }

        input[type="text"] {
            width: calc(100% - 80px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }

        button {
            padding: 10px 20px;
            background-color: #0077b6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1em;
        }

        button:hover {
            background-color: #005f8c;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid #e0e0e0;
            font-size: 0.9em;
            color: #555;
        }

        .search-form {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .search-form input[type="text"] {
            flex: 1;
            width: auto;
        }

        /* Search result cards */
        #homepageResults {
            margin-top: 20px;
        }

        .book-card {
            display: flex;
            align-items: center;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            max-width: 600px;
            margin: 15px auto;
        }

        .book-image {
            width: 80px;
            height: 110px;
            background-color: #e0e0e0;
            border-radius: 6px;
            margin-right: 20px;
        }

        .book-info h3 {
            margin: 0;
            color: #333;
        }

        .book-info p {
            margin: 5px 0 10px 0;
            color: #555;
        }

        .book-info button {
            background-color: #0077b6;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }

        .book-info button:hover {
            background-color: #005f8c;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Holds</a>
    <a href="EditUserInformation.html">Account</a>
    <a href="AdminPage.html">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<div class="hero">
    <div class="search-box">
        <p>Good evening</p>
        <h2>Find Your Next Book</h2>
        <form class="search-form" onsubmit="searchBook(event)">
            <input id="searchQuery" placeholder="Title, Author, or ISBN" type="text"/>
            <button type="submit">Search</button>
        </form>

        <div id="homepageResults"></div>

        <div class="actions">
            <button onclick="goToPage('CatalogPage.html')">Browse Catalog</button>
            <button onclick="goToPage('EditUserInformation.html')">My Account</button>
        </div>
    </div>
</div>

<footer>© 2025 City Library</footer>

<script>
    function searchBook(event) {
        event.preventDefault();
        const query = document.getElementById("searchQuery").value.trim();
        const resultsDiv = document.getElementById("homepageResults");

        resultsDiv.innerHTML = ""; // Clear previous results

        if (!query) {
            alert("Please enter a title, author, or ISBN to search.");
            return;
        }

        fetch("http://localhost:8080/publication/searchHomepage?query=" + encodeURIComponent(query))
            .then(res => res.json())
            .then(data => {
                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = "<p>No results found.</p>";
                    return;
                }

                data.forEach(pub => {
                    const card = document.createElement("div");
                    card.className = "book-card";
                    card.innerHTML = `
                    <div class="book-image"></div>
                    <div class="book-info">
                        <h3>${pub.title}</h3>
                        <p>Authors: ${pub.authors.join(", ")}<br>
                           Genre: ${pub.genre || 'N/A'}<br>
                           ISBN: ${pub.isbn13}</p>
                        <button onclick="placeHold(${pub.isbn13})">Place Hold</button>
                    </div>
                `;
                    resultsDiv.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                resultsDiv.innerHTML = "<p>Error fetching results.</p>";
            });
    }

    function placeHold(isbn13) {
        console.log("Placing hold on ISBN:", isbn13);
        alert("Hold request prepared for book ISBN: " + isbn13);
    }

    function goToPage(page) {
        window.location.href = page;
    }
    async function signOut() {
        try {
            // Call logout on server
            await fetch("/logout", { method: "POST", credentials: "include" });
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        // Redirect to login page
        window.location.href = "AccountLogin.html";
    }
</script>
</body>
