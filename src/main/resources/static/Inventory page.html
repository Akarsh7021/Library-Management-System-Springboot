<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Inventory Management</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .forms-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
        }

        .form-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 340px;
            text-align: left;
        }

        .form-box h2 {
            color: #0077b6;
            text-align: center;
            margin-bottom: 15px;
        }

        .form-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-box input, .form-box textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }

        .form-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-size: 1em;
        }

        .form-box button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        table, th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>

<header><h1>City Library</h1></header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a class="admin-only" href="AdminPage.html">Admin</a>
    <a onclick="signOut()" style="margin-left:12px; color:#d9534f;">Sign Out</a>
</nav>

<main>
    <div class="section-title">Inventory Management</div>

    <div class="forms-container">

        <!-- ADD PUBLICATION -->
        <div class="form-box">
            <h2>Add Publication</h2>
            <form id="addPublicationForm">
                <label>ISBN</label>
                <input id="pubIsbn" required>

                <label>Page Count</label>
                <input id="pageCount" required type="number">

                <label>Publication Date</label>
                <input id="pubDate" required type="date">

                <label>Genre</label>
                <input id="genre" required>

                <label>Title</label>
                <input id="title" required>

                <label>Author(s)</label>
                <input id="authors" required>

                <label>Ebook URL (Optional)</label>
                <input id="ebookUrl" required>

                <button type="submit">Add Publication</button>
            </form>
        </div>

        <!-- DELETE PUBLICATION -->
        <div class="form-box">
            <h2>Delete Publication</h2>
            <form id="deletePublicationForm">
                <label>ISBN</label>
                <input id="deletePubIsbn" required>

                <button type="submit">Delete Publication</button>
            </form>
        </div>

        <!-- ADD BOOK COPY -->
        <div class="form-box">
            <h2>Add Book Copy</h2>
            <form id="addBookCopyForm">
                <label>ISBN</label>
                <input id="copyIsbn" required type="number">

                <label>Serial Barcode</label>
                <input id="copyBarcode" required type="number">

                <label>Acquired Date</label>
                <input id="copyDate" required type="date">

                <button type="submit">Add Book Copy</button>
            </form>
        </div>

        <!-- DELETE BOOK COPY -->
        <div class="form-box">
            <h2>Delete Book Copy</h2>
            <form id="deleteBookCopyForm">
                <label>Serial Barcode</label>
                <input id="deleteCopyBarcode" required>

                <button type="submit">Delete Book Copy</button>
            </form>
        </div>

        <!-- ADD CONDITION NOTE -->
        <div class="form-box">
            <h2>Add Condition Note</h2>
            <form id="addConditionForm">
                <label>Serial Barcode</label>
                <input id="noteBarcode" required type="number">

                <label>Condition Note</label>
                <textarea id="conditionNote" required rows="4"></textarea>

                <button type="submit">Add Condition Note</button>
            </form>
        </div>

        <!-- LOOKUP CONDITION NOTES -->
        <div class="form-box">
            <h2>Lookup Condition Notes</h2>
            <form id="lookupForm">
                <label>Serial Barcode</label>
                <input id="lookupBarcode" required>

                <button type="submit">Lookup Notes</button>
            </form>
        </div>
        <div class="form-box" id="result-container" style="display: none">
            <table style="width: 100%">
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <div class="form-box">
            <h2>Configuration</h2>
            <form id="configurationForm">
                <label for="holdLength">Hold Length (Days)</label>
                <input id="holdLength" required>
                <label for="defaultBorrowTime">Default Borrow Time (Days)</label>
                <input id="defaultBorrowTime" required>

                <button type="submit">Save Configuration</button>
            </form>
        </div>


    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>

    // -------------------------
    // ADD PUBLICATION
    // -------------------------
    document.getElementById("addPublicationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const authorsInput = authors.value.split(',').map(name => name.trim()).filter(name => name);

        const payload = {
            isbn13: Number(pubIsbn.value),
            pageCount: parseInt(pageCount.value),
            publicationDate: pubDate.value,
            genre: genre.value,
            title: title.value,
            authors: authorsInput,
            ebookUrl: ebookUrl.value
        };

        console.log('Sending payload:', payload);

        const res = await fetch("http://localhost:8080/publication", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        alert(res.ok ? "Publication added!" : "Error adding publication");
    });

    // DELETE PUBLICATION
    document.getElementById("deletePublicationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const isbn = deletePubIsbn.value;

        const res = await fetch(`http://localhost:8080/publication/${isbn}`, {
            method: "DELETE"
        });

        alert(res.ok ? "Publication deleted!" : "Error deleting publication");
    });

    // ADD BOOK COPY
    document.getElementById("addBookCopyForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            publication: copyIsbn.value,
            serialBarcode: copyBarcode.value,
            dateAcquired: copyDate.value
        };

        const res = await fetch("http://localhost:8080/book_copy", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        alert(res.ok ? "Book copy added!" : await res.text());
    });

    // DELETE BOOK COPY
    document.getElementById("deleteBookCopyForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const barcode = deleteCopyBarcode.value;

        const res = await fetch(`http://localhost:8080/book_copy/${barcode}`, {
            method: "DELETE"
        });

        alert(res.ok ? "Book copy deleted!" : "Error deleting book copy");
    });

    // ADD CONDITION NOTE
    document.getElementById("addConditionForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            serialBarcodeBookCopy: noteBarcode.value,
            conditionNotes: conditionNote.value,
            createdAt: new Date()
        };

        const res = await fetch(`http://localhost:8080/book_copy_condition_notes`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        alert(res.ok ? "Condition note added!" : await res.text());
    });

    // LOOKUP CONDITION NOTE
    document.getElementById("lookupForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const barcode = lookupBarcode.value;

        const res = await fetch(`http://localhost:8080/book_copy_condition_notes/${barcode}`);

        if (!res.ok) return alert("No notes found.")

        else {
            const notes = await res.json();
            //console.log(notes);

            var tbody = document.getElementById("tbody");
            document.getElementById("result-container").style.display = "inline-block";

            tbody.innerHTML = "<tr>\n" +
                "                <th>Note ID</th>\n" +
                "                <th>Condition Note</th>\n" +
                "                <th>Created At</th>\n" +
                "            </tr>"

            for (var i = 0; i < notes.length; i++) {
                var tr = "<tr>"

                tr += `<td>${notes[i].noteId}</td>`
                tr += `<td>${notes[i].conditionNotes}</td>`
                tr += `<td>${notes[i].createdAt}</td>`
                tr += `</tr>`

                tbody.innerHTML += tr
            }
        }


        //alert("Condition Notes:\n\n" + notes.join("\n"));
    });

    async function applyRoleToNav() {
        try {
            const res = await fetch('/account/current', {credentials: 'include'});
            if (!res.ok) {
                // not authenticated or error -> hide admin links
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                return;
            }
            const me = await res.json();
            const accountType = (me.accountType || '').toString().trim();
            // case-insensitive check for admin
            const isAdmin = accountType.toLowerCase() === 'admin';
            if (!isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            }
        } catch (err) {
            console.warn('applyRoleToNav error:', err);
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    }

    async function getCurrentHoldLength() {
        const response = await fetch("/config/holdLength")
        const data = await response.json();
        console.log(data);
        if (!response.ok) {
            console.error(response);
            alert(data.message);
        } else {
            let currentHoldLengthField = document.getElementById("holdLength")
            currentHoldLengthField.value = data.configValue
        }
    }

    document.addEventListener('DOMContentLoaded', getCurrentHoldLength)

    async function getCurrentBorrowTime() {
        const response = await fetch("/config/borrowTime")
        const data = await response.json();
        console.log(data);
        if (!response.ok) {
            console.error(response);
            alert(data.message);
        } else {
            let currentHoldLengthField = document.getElementById("defaultBorrowTimeime")
            currentHoldLengthField.value = data.configValue
        }
    }

    document.addEventListener('DOMContentLoaded', getCurrentBorrowTime)

    async function saveSettings() {
        let newHoldLengthField = document.getElementById("holdLength");
        let newBorrowTimeField = document.getElementById("defaultBorrowTime");

        const updates = [
            {
                configKey: "holdLength",
                configValue: newHoldLengthField.value,
            },
            {
                configKey: "defaultBorrowTime",
                configValue: newBorrowTimeField.value,
            }
        ];

        try {
            const responses = await Promise.all(
                updates.map(config =>
                    fetch("/config", {
                        method: "PUT",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify(config),
                    })
                )
            );

            const failedResponse = responses.find(r => !r.ok);
            if (failedResponse) {
                console.error("Update failed:", failedResponse);
                const errorDetails = await failedResponse.text();

                let alertMessage = `Error ${failedResponse.status}: ${failedResponse.statusText}.`;

                if (errorDetails && errorDetails.length < 250) {
                    alertMessage += ` Server response: ${errorDetails.trim()}`;
                } else if (errorDetails) {
                    alertMessage += " Server returned a large error message (logged to console).";
                }

                console.error("Full Server Error Body:", errorDetails);
                alert(alertMessage);
            } else {
                await getCurrentHoldLength();
                await getCurrentBorrowTime();
                alert("Saved!");
            }

        } catch (error) {
            console.error("Network error:", error);
            alert("Network error occurred.");
        }
    }

    document.getElementById("configurationForm").addEventListener("submit", function (event) {
            event.preventDefault();
            saveSettings();
        }
    )

    document.addEventListener('DOMContentLoaded', applyRoleToNav);

</script>

</body>
</html>
