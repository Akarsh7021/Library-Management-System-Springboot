<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>City Library | Inventory Management</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .forms-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
        }

        .form-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 340px;
            text-align: left;
        }

        .form-box h2 {
            color: #0077b6;
            text-align: center;
            margin-bottom: 15px;
        }

        .form-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-box input, .form-box textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
        }

        .form-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-size: 1em;
        }

        .form-box button:hover {
            background-color: #005f8c;
        }

        .small-muted {
            font-size: 0.9em;
            color: #666;
            margin-top: -12px;
            margin-bottom: 12px;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        /* results area used by lookup */
        #lookupResults {
            max-width: 720px;
            margin: 16px auto;
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            text-align: left;
        }
    </style>
</head>
<body>

<header><h1>City Library</h1></header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a href="AdminPage.html">Admin</a>
    <a onclick="signOut()" style="margin-left:12px; color:#d9534f;">Sign Out</a>
</nav>

<main>
    <div class="section-title">Inventory Management</div>

    <div class="forms-container">

        <!-- ADD PUBLICATION -->
        <div class="form-box">
            <h2>Add Publication</h2>
            <form id="addPublicationForm">
                <label>ISBN</label>
                <input id="pubIsbn" required>

                <label>Page Count</label>
                <input id="pageCount" required type="number" min="1">

                <label>Publication Date</label>
                <input id="pubDate" required type="date">

                <label>Genre</label>
                <input id="genre" required>

                <label>Title</label>
                <input id="title" required>

                <label>Author(s)</label>
                <input id="authors" placeholder="Author1, Author2" required>

                <button type="submit">Add Publication</button>
            </form>
        </div>

        <!-- DELETE PUBLICATION -->
        <div class="form-box">
            <h2>Delete Publication</h2>
            <form id="deletePublicationForm">
                <label>ISBN</label>
                <input id="deletePubIsbn" required>

                <button type="submit">Delete Publication</button>
            </form>
        </div>

        <!-- ADD BOOK COPY -->
        <div class="form-box">
            <h2>Add Book Copy</h2>
            <form id="addBookCopyForm">
                <label>ISBN</label>
                <input id="copyIsbn" required>

                <label>Serial Barcode</label>
                <input id="copyBarcode" required>

                <button type="submit">Add Book Copy</button>
            </form>
        </div>

        <!-- DELETE BOOK COPY -->
        <div class="form-box">
            <h2>Delete Book Copy</h2>
            <form id="deleteBookCopyForm">
                <label>Serial Barcode</label>
                <input id="deleteCopyBarcode" required>

                <button type="submit">Delete Book Copy</button>
            </form>
        </div>

        <!-- ADD CONDITION NOTE -->
        <div class="form-box">
            <h2>Add Condition Note</h2>
            <form id="addConditionForm">
                <label>Serial Barcode</label>
                <input id="noteBarcode" required>

                <label>Condition Note</label>
                <textarea id="conditionNote" required rows="4"></textarea>

                <button type="submit">Add Condition Note</button>
            </form>
        </div>

        <!-- LOOKUP CONDITION NOTES -->
        <div class="form-box">
            <h2>Lookup Condition Notes</h2>
            <form id="lookupForm">
                <label>Serial Barcode</label>
                <input id="lookupBarcode" required>

                <button type="submit">Lookup Notes</button>
            </form>
        </div>

    </div>

    <div id="lookupResults" style="display:none;"></div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    /* ---------- Helpers ---------- */
    function parseAuthors(input) {
        if (!input) return [];
        input = input.trim();

        // If user pasted a JSON array like ["A","B"]
        if (input.startsWith('[')) {
            try {
                const parsed = JSON.parse(input);
                if (Array.isArray(parsed)) return parsed.map(a => String(a).trim()).filter(Boolean);
            } catch (e) {
                // fall through to token parsing
            }
        }

        // Split on commas, semicolons or newlines
        return input
            .split(/\s*(?:,|;|\n)+\s*/)
            .map(s => s.trim())
            .filter(Boolean);
    }

    async function doFetchJson(url, opts = {}) {
        try {
            const res = await fetch(url, opts);
            const text = await res.text();
            // Try to parse JSON, but gracefully handle non-JSON responses
            let data;
            try { data = text ? JSON.parse(text) : null; } catch (e) { data = text; }
            return { ok: res.ok, status: res.status, data, raw: text };
        } catch (err) {
            console.error("Network/fetch error:", err);
            return { ok: false, status: 0, error: err };
        }
    }

    /* ---------- Sign out ---------- */
    async function signOut() {
        try {
            await fetch("/logout", { method: "POST", credentials: "include" });
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        window.location.href = "AccountLogin.html";
    }

    /* ---------- Add Publication ---------- */
    document.getElementById("addPublicationForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const isbn = document.getElementById("pubIsbn").value.trim();
        const pageCountRaw = document.getElementById("pageCount").value;
        const publicationDate = document.getElementById("pubDate").value;
        const genre = document.getElementById("genre").value.trim();
        const title = document.getElementById("title").value.trim();
        const authorsRaw = document.getElementById("authors").value;

        if (!isbn || !pageCountRaw || !publicationDate || !genre || !title) {
            return alert("Please fill in all required fields.");
        }

        const pageCount = parseInt(pageCountRaw, 10);
        if (isNaN(pageCount) || pageCount < 0) {
            return alert("Page count must be a valid non-negative number.");
        }

        const authors = parseAuthors(authorsRaw);
        if (authors.length === 0) {
            // If backend allows zero authors you can remove this check
            if (!confirm("No authors parsed — continue with empty authors list?")) return;
        }

        const payload = {
            isbn,
            pageCount,
            publicationDate,
            genre,
            title,
            authors // this will be a real JSON array
        };

        const res = await doFetchJson("http://localhost:8080/publication", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        console.log("Add publication response:", res);
        if (res.ok) {
            alert("Publication added!");
            e.target.reset();
        } else {
            alert("Error adding publication — check console for details.");
        }
    });

    /* ---------- Delete Publication ---------- */
    document.getElementById("deletePublicationForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const isbn = document.getElementById("deletePubIsbn").value.trim();
        if (!isbn) return alert("Please enter an ISBN to delete.");

        const res = await doFetchJson(`http://localhost:8080/publication/${encodeURIComponent(isbn)}`, {
            method: "DELETE"
        });

        console.log("Delete publication response:", res);
        if (res.ok) {
            alert("Publication deleted!");
            e.target.reset();
        } else if (res.status === 404) {
            alert("Publication not found.");
        } else {
            alert("Error deleting publication — check console.");
        }
    });

    /* ---------- Add Book Copy ---------- */
    document.getElementById("addBookCopyForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const isbn = document.getElementById("copyIsbn").value.trim();
        const barcode = document.getElementById("copyBarcode").value.trim();

        if (!isbn || !barcode) return alert("Please enter ISBN and Serial Barcode.");

        const payload = {
            isbn: isbn,
            barcode: barcode,
            serialBarcodeBookCopy: barcode // duplicate key in case backend expects this name
        };

        const res = await doFetchJson("http://localhost:8080/bookcopy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        console.log("Add book copy response:", res);
        if (res.ok) {
            alert("Book copy added!");
            e.target.reset();
        } else {
            alert("Error adding book copy — check console.");
        }
    });

    /* ---------- Delete Book Copy ---------- */
    document.getElementById("deleteBookCopyForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const barcode = document.getElementById("deleteCopyBarcode").value.trim();
        if (!barcode) return alert("Please enter the Serial Barcode to delete.");

        const res = await doFetchJson(`http://localhost:8080/bookcopy/${encodeURIComponent(barcode)}`, {
            method: "DELETE"
        });

        console.log("Delete book copy response:", res);
        if (res.ok) {
            alert("Book copy deleted!");
            e.target.reset();
        } else if (res.status === 404) {
            alert("Book copy not found.");
        } else {
            alert("Error deleting book copy — check console.");
        }
    });

    /* ---------- Add Condition Note ---------- */
    document.getElementById("addConditionForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const barcode = document.getElementById("noteBarcode").value.trim();
        const note = document.getElementById("conditionNote").value.trim();

        if (!barcode || !note) return alert("Please enter Serial Barcode and a condition note.");

        // send multiple possible field names to be tolerant with backend
        const payload = {
            barcode,
            serialBarcodeBookCopy: barcode,
            note,
            conditionNotes: note
        };

        const res = await doFetchJson("http://localhost:8080/bookcopy/condition", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        console.log("Add condition note response:", res);
        if (res.ok) {
            alert("Condition note added!");
            e.target.reset();
        } else {
            alert("Error adding condition note — check console.");
        }
    });

    /* ---------- Lookup Condition Notes ---------- */
    document.getElementById("lookupForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const barcode = document.getElementById("lookupBarcode").value.trim();
        if (!barcode) return alert("Please enter a Serial Barcode to look up.");

        const res = await doFetchJson(`http://localhost:8080/bookcopy/condition/${encodeURIComponent(barcode)}`, {
            method: "GET"
        });

        console.log("Lookup condition notes response:", res);

        if (!res.ok) {
            if (res.status === 404) {
                return alert("No notes found for that barcode.");
            }
            return alert("Error looking up notes — check console.");
        }

        const data = res.data;
        if (!data) return alert("No notes found.");

        // Accept variety of response shapes:
        // - array of strings: ["note1","note2"]
        // - array of objects: [{conditionNotes: "x"}, {condition_notes: "y"}]
        // - single object with notes array
        let notesList = [];

        if (Array.isArray(data)) {
            if (data.every(item => typeof item === "string")) {
                notesList = data;
            } else {
                // try to extract text-like fields from objects
                notesList = data.map(obj => {
                    if (!obj) return "";
                    if (typeof obj === "string") return obj;
                    return obj.conditionNotes ?? obj.condition_notes ?? obj.note ?? obj.text ?? JSON.stringify(obj);
                }).filter(Boolean);
            }
        } else if (typeof data === "object") {
            // e.g. { notes: [...] } or a single note object
            if (Array.isArray(data.notes)) {
                notesList = data.notes.map(n => typeof n === "string" ? n : (n.conditionNotes ?? n.condition_notes ?? JSON.stringify(n)));
            } else {
                // single object -> try to get note fields
                const single = data.conditionNotes ?? data.condition_notes ?? data.note ?? data.text;
                if (single) notesList = [single];
            }
        } else if (typeof data === "string") {
            // backend returned plain text
            notesList = [data];
        }

        if (notesList.length === 0) {
            alert("No condition notes found for that barcode.");
        } else {
            alert("Condition Notes:\n\n" + notesList.join("\n\n---\n\n"));
        }
    });

    /* ---------- End of script ---------- */
</script>

</body>
</html>
