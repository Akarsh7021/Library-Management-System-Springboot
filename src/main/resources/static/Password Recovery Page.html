<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Forgot Password</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        .form-box h2 {
            color: #0077b6;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .form-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .form-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background-color 0.2s;
        }

        .form-box button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="Homepage.html">Home</a>
    <a href="catalog_page.html">Catalog</a>
    <a href="borrow page.html">Borrow</a>
    <a href="Place Hold.html">Hold</a>
    <a href="Payment page.html">Payment</a>
    <a href="Account Login.html">Account</a>
    <a href="index.html">Reports</a>
    <a href="Admin Page.html">Admin</a>
</nav>

<main>
    <div class="section-title">Forgot Password</div>

    <div class="form-box">
        <h2>Forgot Password</h2>
        <form id="forgotForm">
            <input id="email" placeholder="Type your email here" required type="email">
            <button type="submit">Send reset link</button>
        </form>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    // Handle forgot password submission
    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();

        try {
            const response = await fetch("http://localhost:8080/api/forgot-password", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email})
            });

            if (response.ok) {
                alert("Password reset link sent to your email!");
            } else {
                alert("Email not found. Please check and try again.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>
</body>
</html>
