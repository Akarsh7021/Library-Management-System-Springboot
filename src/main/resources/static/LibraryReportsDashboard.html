<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>City Library | Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 20px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
        }

        .form-box, .table-box, .chart-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 25px;
            margin-bottom: 40px;
        }

        form {
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }

        form input, form button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1em;
            outline: none;
        }

        form input:focus {
            border-color: #0077b6;
            box-shadow: 0 0 4px rgba(0, 119, 182, 0.3);
        }

        form button {
            background-color: #0077b6;
            color: white;
            border: none;
            cursor: pointer;
            grid-column: 1 / -1;
            font-size: 1em;
            transition: background-color 0.2s;
        }

        form button:hover {
            background-color: #005f8c;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #0077b6;
            color: white;
        }

        .table-scroll {
            max-height: 260px;
            overflow-y: auto;
        }

        .charts {
            display: grid;
            gap: 30px;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        canvas {
            max-height: 300px;
        }

        footer {
            text-align: center;
            padding: 15px;
            margin-top: 60px;
            font-size: 0.9em;
            color: #777;
            border-top: 1px solid #e0e0e0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }


    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a class="admin-only" href="AdminPage.html">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<main>
    <div class="section-title">📊 Library Reports Dashboard</div>

    <!-- FILTER -->
    <div class="form-box">
        <form id="reportForm">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button type="submit">Generate Report</button>
        </form>
    </div>

    <!-- Borrow table -->
    <div class="table-box">
        <h3>📘 Borrow & Return</h3>
        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>User ID</th><th>Name</th><th>Book</th>
                    <th>Borrowed</th><th>Due</th><th>Fine</th>
                </tr>
                </thead>
                <tbody id="borrowBody"></tbody>
            </table>
        </div>
    </div>

    <!--Fine summary -->
    <div class="table-box">
        <h3>💸 Fine Summary</h3>
        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>Account</th><th>Name</th><th>Total</th><th>Last Fine</th>
                </tr>
                </thead>
                <tbody id="fineBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts">
        <div class="chart-box">
            <h3>Genre Popularity</h3>
            <canvas id="genreChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Borrowing Trends</h3>
            <canvas id="borrowChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Top Authors</h3>
            <canvas id="authorChart"></canvas>
        </div>
    </div>
</main>

<footer>© 2025 City Library</footer>

<script>
    /* ================== COLORS ================== */
    const barColors = ['#ef476f','#ffd166','#06d6a0','#118ab2','#073b4c','#adb5bd'];
    const pieColors = ['#6050DC','#D52DB7','#FF2E7E','#FF6B45','#FFAB05','#b2bec3'];

    /* ================== CHARTS ================== */
    let genreChart = new Chart(document.getElementById('genreChart'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [{
                data: [],
                backgroundColor: []
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { precision: 0 }
                }
            }
        }
    });


    const borrowChart = new Chart(document.getElementById('borrowChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ data: [], tension: 0.4,backgroundColor: 'rgba(0,180,216,0.3)', borderColor: '#bf3cea', fill: true }] },
        options: {
            responsive: true,
            plugins: {
                legend: {display: false}
            },
            scales: {
                y: { beginAtZero: true, ticks: {
                    precision: 0 }
                }
            }
        }
    });

    const authorChart = new Chart(document.getElementById('authorChart'), {
        type: 'pie',
        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }
    });

    /* ================== HELPERS ================== */
    function top5WithOther(data, valueKey, labelKey, capRatio) {
        const sorted = [...data].sort((a,b)=>b[valueKey]-a[valueKey]);
        const top = sorted.slice(0,5);
        const rest = sorted.slice(5);

        let labels = top.map(x=>x[labelKey]);
        let values = top.map(x=>x[valueKey]);

        if (rest.length) {
            const sum = rest.reduce((s,x)=>s+x[valueKey],0);
            const cap = Math.min(sum, Math.floor(Math.min(...values)*capRatio));
            labels.push("Other");
            values.push(cap);
        }
        return {labels, values};
    }

    /* ================== UPDATERS ================== */
    function updateGenre(data){
        if (!data.length) return;
        const r = top5WithOther(data,'count','genre',0.5);
        genreChart.data.labels = r.labels;
        genreChart.data.datasets[0].data = r.values;
        genreChart.data.datasets[0].backgroundColor = barColors.slice(0,r.labels.length);
        genreChart.update();
    }

    function updateAuthors(data){
        if (!data.length) return;
        const r = top5WithOther(data,'count','author',0.3);
        authorChart.data.labels = r.labels;
        authorChart.data.datasets[0].data = r.values;
        authorChart.data.datasets[0].backgroundColor = pieColors.slice(0,r.labels.length);
        authorChart.update();
    }

    function updateBorrow(data){
        borrowChart.data.labels = data.map(x=>x.month);
        borrowChart.data.datasets[0].data = data.map(x=>x.count);
        borrowChart.update();
    }

    /* ================== TABLES ================== */
    function fillTable(id, rows, mapper){
        const body = document.getElementById(id);
        body.innerHTML='';
        rows.forEach(r=>{
            const tr = document.createElement('tr');
            tr.innerHTML = mapper(r);
            body.appendChild(tr);
        });
    }

    /* ================== FETCH ================== */
    async function fetchDashboard(start,end){
        const res = await fetch("http://localhost:8080/api/reports/dashboard",{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({startDate:start,endDate:end})
        });
        const d = await res.json();

        fillTable('borrowBody',d.borrowReturn,r=>`
        <td>${r.accountId}</td>
        <td>${r.fullName}</td>
        <td>${r.bookTitle}</td>
        <td>${r.borrowedDate}</td>
        <td>${r.dueDate}</td>
        <td>$${r.fine}</td>`);

        fillTable('fineBody',d.fineSummary,r=>`
        <td>${r.accountId}</td>
        <td>${r.fullName}</td>
        <td>$${r.totalFine}</td>
        <td>${r.lastFineDate}</td>`);

        updateGenre(d.genreStats);
        updateAuthors(d.authorStats);
        updateBorrow(d.borrowTrend);
    }

    document.getElementById('reportForm').onsubmit=e=>{
        e.preventDefault();
        fetchDashboard(startDate.value||null,endDate.value||null);
    };

    window.onload=()=>fetchDashboard(null,null);

    async function signOut(){
        await fetch('/logout',{method:'POST'});
        location.href='AccountLogin.html';
    }
</script>

</body>
</html>
