<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Library | Catalog</title>
    <style>
        /* Make the document fill the viewport and use column flex layout */
        html, body {
            height: 100%;
            margin: 0;
        }

        /* Keep body simple; background is moved to a fixed pseudo-element for reliable fixed background + filter */
        body {
            display: flex;
            flex-direction: column; /* header -> main -> footer */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
            min-height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        /* Fixed background image placed behind everything so it won't scroll.
           The visual effect is applied via the overlay's backdrop-filter to avoid unfiltered strips. */
        body::before {
            content: "";
            position: fixed;
            inset: 0; /* top:0; right:0; bottom:0; left:0 */
            background-image: url('jessica-ruscello-OQSCtabGkSY-unsplash.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -2;
            /* No filter here — overlay will handle the visual effect */
            transform: translateZ(0);
        }

        /* Overlay that sits above the image and applies the backdrop-filter effect you requested.
           This ensures the whole image gets the same treatment and prevents unfiltered strips. */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            backdrop-filter: contrast(20%) brightness(1.7);
            -webkit-backdrop-filter: contrast(20%) brightness(1.7);
            z-index: -1;
        }

        header { background-color: #ffffff; padding: 10px 40px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.5em; margin: 0; color: #000; }

        nav { background-color: #ffffff; display: flex; gap: 30px; padding: 12px 40px; border-bottom: 1px solid #e0e0e0; }
        nav a { text-decoration: none; color: #333; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #0077b6; }

        /* Make main stretch to take remaining space so footer goes to bottom */
        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: 0 auto; /* center horizontally */
            flex: 1 0 auto; /* grow and shrink, take available space */
            width: 100%;
            box-sizing: border-box;
        }

        .section-title { font-size: 1.8em; color: #0077b6; margin-bottom: 20px; border-left: 4px solid #0077b6; padding-left: 10px; }
        .tab-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .tab-container button { background-color: #fff; border: 1px solid #ccc; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: 500; transition: all 0.2s ease; }
        .tab-container button.active, .tab-container button:hover { background-color: #0077b6; color: #fff; border-color: #0077b6; }

        .search-bar { display: flex; margin-bottom: 30px; }
        .search-bar input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 1em; }
        .search-bar button { background-color: #0077b6; color: white; border: none; border-radius: 8px; padding: 10px 15px; margin-left: 10px; cursor: pointer; transition: 0.2s; }
        .search-bar button:hover { background-color: #005f8c; }

        /* Book card layout */
        .book-card {
            display: flex;
            align-items: flex-start; /* align the details to the top */
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            max-width: 800px;
            margin: 15px auto;
            gap: 0; /* remove gap reserved for image */
        }

        /* hide any existing cover image element (no HTML change needed) */
        .book-image {
            display: none !important;
            width: 0;
            height: 0;
            margin: 0;
            padding: 0;
            visibility: hidden;
        }

        /* left-align details and allow them to grow */
        .book-info {
            text-align: left;
            flex: 1 1 auto;
        }

        .book-info h3 { margin: 0; color: #333; }
        .book-info p { margin: 6px 0 12px 0; color: #555; line-height: 1.4; }
        .book-info button { background-color: #0077b6; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .book-info button:hover { background-color: #005f8c; }

        footer {
            text-align: center;
            padding: 15px;
            background-color: rgb(255, 255, 255);
            border-top: 1px solid #e0e0e0;
            font-size: 0.9em;
            color: #555;
            /* footer will naturally sit at the bottom because main is flexible */
            flex-shrink: 0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        /* Small screens: reduce paddings so layout looks ok */
        @media (max-width: 700px) {
            header, nav { padding-left: 16px; padding-right: 16px; }
            main { padding-left: 16px; padding-right: 16px; }
            .book-card { margin: 10px; padding: 14px; }
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a href="AdminPage.html">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<main>
    <div class="section-title">Catalog</div>

    <div class="tab-container">
        <button class="active" onclick="setActiveTab(this)">Book</button>
        <button onclick="setActiveTab(this)">Author</button>
        <button onclick="setActiveTab(this)">Genre</button>
    </div>

    <div class="search-bar">
        <input id="catalogSearch" placeholder="Search..." type="text">
        <button onclick="searchCatalog()">Search</button>
    </div>

    <!-- Container for dynamic search results -->
    <div id="searchResults"></div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    let currentType = "book";

    function escapeHtml(unsafe) {
        return unsafe
            ? unsafe.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;")
            : "";
    }

    function setActiveTab(button) {
        document.querySelectorAll('.tab-container button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        currentType = button.textContent.trim().toLowerCase();
    }

    function searchCatalog() {
        const query = document.getElementById("catalogSearch").value.trim();
        if (!query) {
            alert("Please enter a search term.");
            return;
        }

        fetch(`http://localhost:8080/publication/search?type=${currentType}&query=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                const resultsDiv = document.getElementById("searchResults");
                resultsDiv.innerHTML = "";

                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = "<p>No results found.</p>";
                    return;
                }

                data.forEach(pub => {
                    const authorsText = (pub.authors && pub.authors.length) ? pub.authors.join(', ') : 'Unknown';
                    const card = document.createElement("div");
                    card.className = "book-card";
                    card.innerHTML = `
                        <div class="book-image"></div>
                        <div class="book-info">
                            <h3>${escapeHtml(pub.title || 'Untitled')}</h3>
                            <p><strong>Author:</strong> ${escapeHtml(authorsText)}<br>
                               <strong>Genre:</strong> ${escapeHtml(pub.genre || 'N/A')}<br>
                               <strong>Pages:</strong> ${escapeHtml(pub.pageCount?.toString() || 'N/A')}</p>
                            <button onclick="placeHold(${pub.isbn13})">Place Hold</button>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                alert("Error fetching search results.");
            });
    }

    function placeHold(isbn13) {
        console.log("Placing hold on ISBN:", isbn13);
        alert("Hold request prepared for book ISBN: " + isbn13);
    }

    async function signOut() {
        try {
            // Call logout on server
            await fetch("/logout", { method: "POST", credentials: "include" });
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        // Redirect to login page
        window.location.href = "AccountLogin.html";
    }
</script>
</body>
</html>
