<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Library | Catalog</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9fafc; color: #333; }
        header { background-color: #ffffff; padding: 10px 40px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 1.5em; margin: 0; color: #000; }
        nav { background-color: #ffffff; display: flex; gap: 30px; padding: 12px 40px; border-bottom: 1px solid #e0e0e0; }
        nav a { text-decoration: none; color: #333; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #0077b6; }
        main { padding: 40px 80px; max-width: 1200px; margin: auto; }
        .section-title { font-size: 1.8em; color: #0077b6; margin-bottom: 20px; border-left: 4px solid #0077b6; padding-left: 10px; }
        .tab-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .tab-container button { background-color: #fff; border: 1px solid #ccc; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: 500; transition: all 0.2s ease; }
        .tab-container button.active, .tab-container button:hover { background-color: #0077b6; color: #fff; border-color: #0077b6; }
        .search-bar { display: flex; margin-bottom: 30px; }
        .search-bar input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 1em; }
        .search-bar button { background-color: #0077b6; color: white; border: none; border-radius: 8px; padding: 10px 15px; margin-left: 10px; cursor: pointer; transition: 0.2s; }
        .search-bar button:hover { background-color: #005f8c; }
        .book-card { display: flex; align-items: center; background-color: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; max-width: 800px; margin: 15px auto; }
        .book-image { width: 90px; height: 120px; background-color: #e0e0e0; border-radius: 6px; margin-right: 20px; }
        .book-info h3 { margin: 0; color: #333; }
        .book-info p { margin: 6px 0 12px 0; color: #555; }
        .book-info button { background-color: #0077b6; color: #fff; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .book-info button:hover { background-color: #005f8c; }
        footer {
            text-align: center;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid #e0e0e0;
            font-size: 0.9em;
            color: #555;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="BorrowPage.html">Borrow</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="PaymentPage.html">Payment</a>
    <a href="EditUserInformation.html">Account</a>
    <a href="LibraryReportsDashboard.html">Reports</a>
    <a href="AdminPage.html">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<main>
    <div class="section-title">Catalog</div>

    <div class="tab-container">
        <button class="active" onclick="setActiveTab(this)">Book</button>
        <button onclick="setActiveTab(this)">Author</button>
        <button onclick="setActiveTab(this)">Genre</button>
    </div>

    <div class="search-bar">
        <input id="catalogSearch" placeholder="Search..." type="text">
        <button onclick="searchCatalog()">🔍</button>
    </div>

    <!-- Container for dynamic search results -->
    <div id="searchResults"></div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    let currentType = "book";

    function escapeHtml(unsafe) {
        return unsafe
            ? unsafe.replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;")
            : "";
    }

    function setActiveTab(button) {
        document.querySelectorAll('.tab-container button').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        currentType = button.textContent.trim().toLowerCase();
    }

    function searchCatalog() {
        const query = document.getElementById("catalogSearch").value.trim();
        if (!query) {
            alert("Please enter a search term.");
            return;
        }

        fetch(`http://localhost:8080/publication/search?type=${currentType}&query=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                const resultsDiv = document.getElementById("searchResults");
                resultsDiv.innerHTML = "";

                if (!data || data.length === 0) {
                    resultsDiv.innerHTML = "<p>No results found.</p>";
                    return;
                }

                data.forEach(pub => {
                    const authorsText = (pub.authors && pub.authors.length) ? pub.authors.join(', ') : 'Unknown';
                    const card = document.createElement("div");
                    card.className = "book-card";
                    card.innerHTML = `
                        <div class="book-image"></div>
                        <div class="book-info">
                            <h3>${escapeHtml(pub.title || 'Untitled')}</h3>
                            <p><strong>Author:</strong> ${escapeHtml(authorsText)}<br>
                               <strong>Genre:</strong> ${escapeHtml(pub.genre || 'N/A')}<br>
                               <strong>Pages:</strong> ${escapeHtml(pub.pageCount?.toString() || 'N/A')}</p>
                            <button onclick="placeHold(${pub.isbn13})">Place Hold</button>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                alert("Error fetching search results.");
            });
    }

    function placeHold(isbn13) {
        console.log("Placing hold on ISBN:", isbn13);
        alert("Hold request prepared for book ISBN: " + isbn13);
    }

    async function signOut() {
        try {
            // Call logout on server
            await fetch("/logout", { method: "POST", credentials: "include" });
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        // Redirect to login page
        window.location.href = "AccountLogin.html";
    }
</script>
</body>
</html>
