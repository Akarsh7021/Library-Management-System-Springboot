<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Edit Member Details</title>
    <style>
        /* overall layout so footer stays at bottom */
        html, body {
            height: 100%;
            margin: 0;
        }

        /* body holds layout; background image moved to a fixed pseudo-element so we can filter it reliably */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
            position: relative; /* establishes stacking context for the pseudo-element */
        }

        /* full-viewport background image with applied filter — covers everything and doesn't scroll */
        body::before {
            content: "";
            position: fixed;
            inset: 0;                           /* top/right/bottom/left: 0 */
            z-index: -1;                        /* put behind page content */
            background-image: url('jessica-ruscello-OQSCtabGkSY-unsplash.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            /* apply filter consistently across the whole image */
            filter: contrast(35%) brightness(1.5);
            /* optional subtle overlay so white panels remain easy to read */
            /* add an rgba overlay with linear-gradient if you want a tint:
               background-image: linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.18)), url(...);
            */
            will-change: transform; /* performance hint */
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.5em; margin: 0; color: #000; }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }
        nav a { text-decoration: none; color: #333; font-weight: 500; transition: color 0.2s; cursor: pointer; }
        nav a:hover { color: #0077b6; }

        /* main area grows to push footer down */
        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            flex: 1 0 auto;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            text-align: left;
        }

        .form-box label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-box input[type="text"],
        .form-box input[type="email"],
        .form-box input[type="password"],
        .form-box input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .button-group button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 48%;
            font-size: 1em;
        }
        .button-group button.delete { background-color: #d9534f; }
        .button-group button:hover { background-color: #005f8c; }
        .button-group button.delete:hover { background-color: #c9302c; }

        /* footer — match other pages and remain at bottom */
        footer {
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            flex-shrink: 0;
        }
        .footer-content {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .footer-content p { margin: 0; font-size: 0.9em; color: #777; }
        .footer-links { display: flex; gap: 20px; }
        .footer-links a { text-decoration: none; color: #333; font-size: 0.9em; transition: color 0.2s; }
        .footer-links a:hover { color: #0077b6; }

        /* responsive */
        @media (max-width: 760px) {
            main { padding: 24px; }
            nav { padding: 12px 20px; gap: 12px; }
            .form-box { margin: 20px auto; width: 100%; max-width: 420px; }
            .footer-content { padding: 0 20px; }
            .button-group button { width: 100%; }
            .button-group { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a onclick="goTo('HomePage.html')">Home</a>
    <a onclick="goTo('CatalogPage.html')">Catalog</a>
    <a onclick="goTo('PlaceHold.html')">Hold</a>
    <a onclick="goTo('EditUserInformation.html')">Account</a>
    <a onclick="goTo('AdminPage.html')">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<main>
    <div class="section-title">Edit Member Details</div>

    <div class="form-box">
        <form id="memberForm">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" placeholder="Enter full name" required type="text">

            <label for="email">Email</label>
            <input id="email" name="email" placeholder="Enter email" required type="email">

            <label for="password">Password (leave blank to keep current)</label>
            <input id="password" name="password" placeholder="Enter new password" type="password">

            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" placeholder="(xxx) - xxx - xxx" required type="tel">

            <input type="hidden" id="libraryCard" name="libraryCard">

            <div class="button-group">
                <button type="submit">Update</button>
                <button class="delete" id="deleteBtn" type="button">Delete</button>
            </div>
        </form>
    </div>
</main>

<footer>
    <div class="footer-content">
        <p>© 2025 City Library</p>
    </div>
</footer>

<script>
    function goTo(page) { window.location.href = page; }

    async function loadCurrentAccount() {
        try {
            const response = await fetch("http://localhost:8080/account/current", {
                credentials: "include"
            });
            if (!response.ok) throw new Error("Could not fetch member information.");
            const data = await response.json();
            document.getElementById("fullname").value = data.fullName || "";
            document.getElementById("email").value = data.notificationEmail || "";
            document.getElementById("phone").value = data.phoneNumber || "";
            document.getElementById("libraryCard").value = data.accountId || "";
            document.getElementById("password").value = "";
        } catch (error) {
            console.error(error);
            alert("Could not fetch member information.");
        }
    }

    window.addEventListener("DOMContentLoaded", loadCurrentAccount);

    // Update
    document.getElementById("memberForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const accountId = parseInt(document.getElementById("libraryCard").value, 10);
        if (!accountId) {
            alert("Missing account ID.");
            return;
        }

        const member = {
            accountId: accountId,
            fullName: document.getElementById("fullname").value,
            notificationEmail: document.getElementById("email").value,
            phoneNumber: document.getElementById("phone").value,
            // send passwordHash only if user entered a value (server will ignore empty)
            passwordHash: document.getElementById("password").value || null
        };

        try {
            const response = await fetch("http://localhost:8080/account", {
                method: "PUT",
                credentials: "include",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(member)
            });

            if (response.ok) {
                const updated = await response.json();
                // update fields with returned saved values
                document.getElementById("fullname").value = updated.fullName || "";
                document.getElementById("email").value = updated.notificationEmail || "";
                document.getElementById("phone").value = updated.phoneNumber || "";
                document.getElementById("password").value = "";
                alert("Member details updated successfully!");
            } else {
                const txt = await response.text();
                alert("Update failed: " + txt);
            }
        } catch (error) {
            console.error(error);
            alert("Could not connect to the server.");
        }
    });

    // Delete
    document.getElementById("deleteBtn").addEventListener("click", async function() {
        const accountId = document.getElementById("libraryCard").value;
        if (!accountId) {
            alert("Could not find account ID.");
            return;
        }
        if (!confirm("Are you sure you want to delete this account?")) return;

        try {
            const response = await fetch(`http://localhost:8080/account/${accountId}`, {
                method: "DELETE",
                credentials: "include"
            });

            if (response.status === 204 || response.ok) {
                // call logout to be safe (server-side session should be invalidated too)
                try { await fetch("/logout", { method: "POST", credentials: "include" }); } catch (e) { /* ignore */ }
                alert("Account deleted. You will be signed out.");
                window.location.href = "AccountLogin.html";
            } else {
                const txt = await response.text();
                alert("Delete failed: " + txt);
            }
        } catch (error) {
            console.error(error);
            alert("Could not connect to the server.");
        }
    });

    // Sign out action (nav)
    async function signOut() {
        try { await fetch("/logout", { method: "POST", credentials: "include" }); } catch (err) { console.warn("Logout request failed:", err); }
        window.location.href = "AccountLogin.html";
    }
</script>
</body>
</html>
