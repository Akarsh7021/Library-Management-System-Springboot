<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Account / Info</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .login-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            text-align: left;
        }

        .login-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .login-box .remember {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .login-box .remember label {
            margin-left: 8px;
            font-weight: normal;
        }

        .login-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-size: 1em;
        }

        .login-box button:hover {
            background-color: #005f8c;
        }

        .login-links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95em;
        }

        .login-links a {
            color: #0077b6;
            text-decoration: none;
        }

        .login-links a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="BorrowPage.html">Borrow</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="PaymentPage.html">Payment</a>
    <a href="AccountLogin.html">Account</a>
    <a href="LibraryReportsDashboard.html">Reports</a>
    <a href="AdminPage.html">Admin</a>
</nav>

<main>
    <div class="section-title">Account / Info</div>

    <div class="login-box">
        <form id="loginForm">
            <label for="username">Username</label>
            <input id="username" name="username" placeholder="Enter your username" required type="text">

            <label for="password">Password</label>
            <input id="password" name="password" placeholder="Enter your password" required type="password">

            <div class="remember">
                <input id="remember" name="remember" type="checkbox">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="login-links">
            <p>Forgot Password? Please <a href="PasswordRecoveryPage.html">click here</a></p>
            <p>Don't have an account? Please <a href="RegisterationPage.html">register</a></p>
        </div>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>



<script>
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        const loginData = { notificationEmail: email, password: password };

        try {
            const response = await fetch("http://localhost:8080/account/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(loginData)
            });

            if (response.ok) {
                const data = await response.json();
                alert("Login successful! Welcome " + data.fullName);
                // window.location.href = "HomePage.html"; // Optional redirect
            } else if (response.status === 401) {
                alert("Invalid email or password.");
            } else {
                alert("Login failed. Please try again.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to server.");
        }
    });
</script>
</body>
</html>
