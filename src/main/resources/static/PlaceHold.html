<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Place Hold</title>
    <style>
        /* page layout */
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* ensures footer can be pushed to bottom */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('jessica-ruscello-OQSCtabGkSY-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(35%) brightness(1.5);
            background-color: #f9fafc;
            color: #333;
        }

        /* header */
        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        /* nav */
        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
        nav a:hover { color: #0077b6; }

        /* main - flexible area grows to fill */
        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            flex: 1 0 auto; /* allows main to grow and push footer to bottom */
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .forms {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .hold-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 350px;
        }

        .hold-box h2 {
            color: #0077b6;
            margin-bottom: 20px;
        }

        .hold-box label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .hold-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .hold-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        .hold-box button:hover { background-color: #005f8c; }

        /* footer — match other pages and stick to bottom via flex layout */
        footer {
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            padding: 15px;
            flex-shrink: 0; /* don't shrink footer */
        }

        .footer-content {
            max-width: 1200px;
            margin: auto;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .footer-content p {
            margin: 0;
            font-size: 0.9em;
            color: #777;
        }

        .footer-links {
            display: flex;
            gap: 25px;
        }

        .footer-links a {
            text-decoration: none;
            color: #333;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: #0077b6; }

        /* small responsive tweak */
        @media (max-width: 760px) {
            main { padding: 24px; }
            nav { padding: 12px 20px; gap: 12px; }
            .forms { gap: 20px; }
            .hold-box { width: 100%; max-width: 420px; }
            .footer-content { padding: 0 20px; }
        }

        /* optional message styling */
        .message { margin-top: 8px; font-size: 0.95em; }
        .message.success { color: #2b8a3e; }
        .message.error { color: #c53030; }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a href="AdminPage.html">Admin</a>
    <a style="margin-left:12px; color:#d9534f;" onclick="signOut()">Sign Out</a>
</nav>

<main>
    <div class="section-title">Place Hold</div>

    <div class="forms">
        <!-- Place Hold -->
        <div class="hold-box">
            <h2>Place Hold</h2>
            <form id="placeHoldForm">
                <label for="bookId">Book ID</label>
                <input id="bookId" name="bookId" placeholder="Enter Book ID" required type="text">

                <label for="accountId">Account ID</label>
                <input id="accountId" name="accountId" placeholder="Enter Account ID" required type="text">

                <button type="submit">Place Hold</button>
                <div id="placeMsg" class="message" aria-live="polite"></div>
            </form>
        </div>

        <!-- Cancel Hold -->
        <div class="hold-box">
            <h2>Cancel Hold</h2>
            <form id="cancelHoldForm">
                <label for="cancelBookId">Book ID</label>
                <input id="cancelBookId" name="cancelBookId" placeholder="Enter Book ID" required type="text">

                <label for="cancelAccountId">Account ID</label>
                <input id="cancelAccountId" name="cancelAccountId" placeholder="Enter Account ID" required type="text">

                <button type="submit">Cancel Hold</button>
                <div id="cancelMsg" class="message" aria-live="polite"></div>
            </form>
        </div>
    </div>
</main>

<footer>
    <div class="footer-content">
        <p>© 2025 City Library</p>
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const API_BASE = "http://localhost:8080/hold";

        // grab elements safely
        const placeForm = document.getElementById("placeHoldForm");
        const cancelForm = document.getElementById("cancelHoldForm");
        const placeMsg = document.getElementById("placeMsg");
        const cancelMsg = document.getElementById("cancelMsg");

        // helper to set message
        function setMessage(elem, text, isError = false) {
            if (!elem) return;
            elem.textContent = text || "";
            elem.classList.remove("success", "error");
            if (isError) elem.classList.add("error");
            else if (text) elem.classList.add("success");
        }

        // guard: if the form isn't on the page, do nothing (prevents null errors)
        if (placeForm) {
            placeForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                setMessage(placeMsg, "", false);

                const bookId = (document.getElementById("bookId")?.value || "").trim();
                const accountId = (document.getElementById("accountId")?.value || "").trim();

                if (!bookId || !accountId) {
                    setMessage(placeMsg, "Book ID and Account ID are required.", true);
                    return;
                }

                const payload = { bookId: bookId, accountId: accountId };

                try {
                    const res = await fetch(API_BASE, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        credentials: "include",
                        body: JSON.stringify(payload)
                    });

                    const text = await res.text();
                    if (res.ok) {
                        setMessage(placeMsg, "Hold placed successfully.");
                        placeForm.reset();
                    } else {
                        // show server message or fallback status
                        setMessage(placeMsg, `Failed to place hold: ${text || res.statusText}`, true);
                        console.warn("Place hold failed:", res.status, text);
                    }
                } catch (err) {
                    console.error("Network error placing hold:", err);
                    setMessage(placeMsg, "Could not connect to the server.", true);
                }
            });
        }

        if (cancelForm) {
            cancelForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                setMessage(cancelMsg, "", false);

                const bookId = (document.getElementById("cancelBookId")?.value || "").trim();
                const accountId = (document.getElementById("cancelAccountId")?.value || "").trim();

                if (!bookId || !accountId) {
                    setMessage(cancelMsg, "Book ID and Account ID are required.", true);
                    return;
                }

                try {
                    const res = await fetch(`${API_BASE}?bookId=${encodeURIComponent(bookId)}&accountId=${encodeURIComponent(accountId)}`, {
                        method: "DELETE",
                        credentials: "include"
                    });

                    const text = await res.text();
                    if (res.ok) {
                        setMessage(cancelMsg, "Hold cancelled successfully.");
                        cancelForm.reset();
                    } else {
                        setMessage(cancelMsg, `Failed to cancel hold: ${text || res.statusText}`, true);
                        console.warn("Cancel hold failed:", res.status, text);
                    }
                } catch (err) {
                    console.error("Network error cancelling hold:", err);
                    setMessage(cancelMsg, "Could not connect to the server.", true);
                }
            });
        }
    });

    async function signOut() {
        try {
            await fetch("/logout", { method: "POST", credentials: "include" });
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        window.location.href = "AccountLogin.html";
    }
</script>
</body>
</html>
