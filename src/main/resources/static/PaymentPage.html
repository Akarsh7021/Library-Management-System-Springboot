<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Payments and Fines</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .payment-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 600px;
            margin: 40px auto;
        }

        .container{
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            padding: 30px;
            margin: 40px auto;
        }

        .payment-container{
            display: flex;
        }

        .payment-box label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .payment-box input, .payment-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a class="admin-only" href="AdminPage.html">Admin</a>
    <a onclick="signOut()" style="margin-left:12px; color:#d9534f;">Sign Out</a>
</nav>

<main>
    <div class="payment-container">
        <div class="container">
            <div class="section-title">Payments and Fines</div>
            <!--PAYMENT FORM-->
            <div class="payment-box">
                <form id="paymentForm">
                    <label for="accountId">Account ID</label>
                    <input id="accountId" name="accountId" placeholder="Enter Account ID" required type="text">

                    <label for="paymentAmount">Payment Amount</label>
                    <input id="paymentAmount" name="paymentAmount" placeholder="Enter amount" required type="number">

                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">--Select Method--</option>
                        <option value="cash">Cash</option>
                        <option value="credit">Credit</option>
                        <option value="debit">Debit</option>
                    </select>

                    <div class="button-group">
                        <button type="submit">Pay</button>
                        <button id="printReceipt" type="button">Print/Save Receipt</button>
                    </div>
                </form>
            </div>
        </div>

        <!--FINE CONFIG FORM -->
        <div class="container">
            <div class="section-title">Fine Multiplier</div>
            <div class="payment-box">
                <form id="fineConfigForm">
                    <label for="fineMultiplier_current">Current Fine Multiplier</label>
                    <input id="fineMultiplier_current" name="fineMultiplier_current" disabled>
                    <label for="fineMultiplier_new">New Fine Multiplier</label>
                    <input id="fineMultiplier_new" name="fineMultiplier_new" placeholder="Enter a number" required type="number">
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    const accountIdInput = document.getElementById("accountId");


    //  Submit payment
    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const payment = {
            accountIdAccount: document.getElementById("accountId").value,
            paymentAmount: parseFloat(document.getElementById("paymentAmount").value),
            paymentMethod: document.getElementById("paymentMethod").value

        };

        try {
            const response = await fetch("http://localhost:8080/payment", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(payment)
            });

            if (response.ok) {
                alert("Payment successful!");

                document.getElementById("paymentForm").reset();
            } else {
                alert("Payment failed. Please try again.");
                console.error(response);
            }
        } catch (error) {
            console.error("Error submitting payment:", error);
            alert("Could not connect to server.");
        }
    });

    // Print or Save Receipt
    //document.getElementById("printReceipt").addEventListener("click", () => {
    //window.print();
    //});
</script>
<script>
    document.querySelector('button[type="button"]').addEventListener('click', generateInvoice);

    function generateInvoice() {
        const accountId = document.getElementById("accountId").value;
        const paymentAmount = document.getElementById("paymentAmount").value;
        const paymentMethod = document.getElementById("paymentMethod").value;

        if (!accountId || !paymentAmount || !paymentMethod) {
            alert("Please fill out all payment details before generating a receipt.");
            return;
        }

        const today = new Date();
        const formattedDate = today.toLocaleDateString();
        const formattedTime = today.toLocaleTimeString();

        // Create a printable invoice window
        const invoiceWindow = window.open('', '_blank');
        invoiceWindow.document.write(`
    <html>
      <head>
        <title>Payment Receipt - City Library</title>
        <style>
          body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px;
            background-color: #f9fafc;
            color: #333;
          }
          .receipt-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
          }
          h1 {
            text-align: center;
            color: #0077b6;
            margin-bottom: 10px;
          }
          .info {
            text-align: center;
            font-size: 0.95em;
            color: #666;
            margin-bottom: 20px;
          }
          table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
          }
          th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
          }
          th {
            background-color: #0077b6;
            color: white;
          }
          .total {
            text-align: right;
            font-weight: bold;
            font-size: 1.1em;
          }
          .footer {
            text-align: center;
            font-size: 0.9em;
            color: #777;
            margin-top: 30px;
          }
          .print-btn {
            display: block;
            margin: 20px auto 0;
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
          }
          .print-btn:hover {
            background-color: #005f8c;
          }
        </style>
      </head>
      <body>
        <div class="receipt-box">
          <h1>City Library Receipt</h1>
          <div class="info">
            <p>Date: ${formattedDate} | Time: ${formattedTime}</p>
            <p>Transaction ID: ${"INV-" + Math.floor(Math.random() * 90000 + 10000)}</p>
          </div>
          <table>
            <tr><th>Account ID</th><td>${accountId}</td></tr>
            <tr><th>Payment Method</th><td>${paymentMethod}</td></tr>
            <tr><th>Payment Amount</th><td>$${paymentAmount}</td></tr>
          </table>
          <p class="total">Total Paid: $${paymentAmount}</p>
          <div class="footer">
            <p>Thank you for your payment!</p>
            <p>City Library • www.citylibrary.ca</p>
          </div>
          <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
        </div>
      </body>
    </html>
  `);
        invoiceWindow.document.close();
    }

    async function signOut() {
        try {
            // Call logout on server
            await fetch("/logout", {method: "POST", credentials: "include"});
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        // Redirect to login page
        window.location.href = "AccountLogin.html";
    }

    async function applyRoleToNav() {
        try {
            const res = await fetch('/account/current', {credentials: 'include'});
            if (!res.ok) {
                // not authenticated or error -> hide admin links
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                return;
            }
            const me = await res.json();
            const accountType = (me.accountType || '').toString().trim();
            // case-insensitive check for admin
            const isAdmin = accountType.toLowerCase() === 'admin';
            if (!isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            }
        } catch (err) {
            console.warn('applyRoleToNav error:', err);
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    }

    // get fine multiplier from Configuration and update field
    async function getCurrentFineMultiplier(){
        const res = await fetch("/config/fineMultiplier");
        const data = await res.json();
        //console.log(data);
        if (!res.ok) { alert(data.message); }

        else
        {
            let currentMultiplierField= document.getElementById("fineMultiplier_current");
            currentMultiplierField.value = "$" + data.configValue + "/Day";
        }
    }

    // configure fine multiplier
    async function updateFineMultiplier() {
        let newFineMultiplierField = document.getElementById("fineMultiplier_new");

        const newConfig = {
            configKey: "fineMultiplier",
            configValue: newFineMultiplierField.value,
        };

        // update
        const res = await fetch("/config", {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(newConfig)
        });

        if(!res.ok) { alert(res.message); }

        if(res.ok){ //if all good
            // display the current value to field
            document.getElementById("fineMultiplier_current").value = "$" + newFineMultiplierField.value + "/Day";
            newFineMultiplierField.value = "";
            alert("Fine Multiplier successfully updated!");
            // trigger fine recalculation
            await fetch("fine/recalc");
        }
    }

    document.addEventListener('DOMContentLoaded', applyRoleToNav);
    document.addEventListener('DOMContentLoaded', getCurrentFineMultiplier);

    // submit action for Fine Config Form
    document.getElementById("fineConfigForm").addEventListener("submit", function (event) {
        event.preventDefault();
        updateFineMultiplier();
    });
</script>

</body>
</html>
