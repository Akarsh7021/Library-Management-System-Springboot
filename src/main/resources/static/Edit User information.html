<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Edit Member Details</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
            text-align: left;
        }

        .form-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-box input[type="text"],
        .form-box input[type="email"],
        .form-box input[type="password"],
        .form-box input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .button-group button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 48%;
            font-size: 1em;
        }

        .button-group button.delete {
            background-color: #d9534f;
        }

        .button-group button:hover {
            background-color: #005f8c;
        }

        .button-group button.delete:hover {
            background-color: #c9302c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="Homepage.html">Home</a>
    <a href="catalog_page.html">Catalog</a>
    <a href="borrow page.html">Borrow</a>
    <a href="Place Hold.html">Hold</a>
    <a href="Payment page.html">Payment</a>
    <a href="Account Login.html">Account</a>
    <a href="index.html">Reports</a>
    <a href="Admin Page.html">Admin</a>
</nav>

<main>
    <div class="section-title">Edit Member Details</div>

    <div class="form-box">
        <form id="memberForm">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" placeholder="Enter full name" required type="text">

            <label for="email">Email</label>
            <input id="email" name="email" placeholder="Enter email" required type="email">

            <label for="password">Password</label>
            <input id="password" name="password" placeholder="Enter password" required type="password">

            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" placeholder="(xxx) - xxx - xxx" required type="tel">

            <label for="libraryCard">Library Card</label>
            <input id="libraryCard" name="libraryCard" placeholder="Enter Library Card ID" required type="text">

            <div class="button-group">
                <button type="submit">Update</button>
                <button class="delete" id="deleteBtn" type="button">Delete</button>
            </div>
        </form>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    // Handle Update (PUT request)
    document.getElementById("memberForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const member = {
            fullname: document.getElementById("fullname").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            phone: document.getElementById("phone").value,
            libraryCard: document.getElementById("libraryCard").value
        };

        try {
            const response = await fetch("http://localhost:8080/api/members/update", {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(member)
            });

            if (response.ok) {
                alert("Member details updated successfully!");
            } else {
                alert("Update failed. Please check the inputs.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    });

    // Handle Delete (DELETE request)
    document.getElementById("deleteBtn").addEventListener("click", async function () {
        const libraryCard = document.getElementById("libraryCard").value;

        if (!libraryCard) {
            alert("Please enter the Library Card ID to delete a member.");
            return;
        }

        if (!confirm("Are you sure you want to delete this member?")) return;

        try {
            const response = await fetch(`http://localhost:8080/api/members/delete/${libraryCard}`, {
                method: "DELETE"
            });

            if (response.ok) {
                alert("Member deleted successfully!");
            } else {
                alert("Delete failed. Member not found.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>
</body>
</html>
