<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Add / Delete Users</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .user-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 28px;
            width: 420px;
            text-align: left;
        }

        .user-box h2 {
            color: #0077b6;
            margin-bottom: 16px;
        }

        .user-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        .user-box input[type='number'],
        .user-box input[type="text"],
        .user-box input[type="email"],
        .user-box input[type="password"],
        .user-box input[type="tel"],
        .user-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
        }

        .button-group button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 48%;
            font-size: 1em;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .user-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-size: 1em;
            box-sizing: border-box;
        }

        .user-box button:hover {
            background-color: #005f8c;
        }

        .button-group button.delete {
            background-color: #d9534f;
        }

        .button-group button.delete:hover {
            background-color: #c9302c;
        }

        .hint {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .msg {
            margin-top: 12px;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;
        }

        nav a {
            cursor: pointer;
        }

        /* small nicety: disabled button style */
        button[disabled] {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a class="admin-only" href="AdminPage.html">Admin</a>
    <a onclick="signOut()" style="margin-left:12px; color:#d9534f;">Sign Out</a>
</nav>

<main>
    <div class="section-title">Add / Delete Users</div>

    <div class="form-container">
        <!-- Create user -->
        <div class="user-box">
            <h2>Create user</h2>
            <p class="hint">Create a user and link to an existing library card (enter card ID if available).</p>

            <label for="fullName">Full name</label>
            <input id="fullName" placeholder="Jane Doe" required type="text">

            <label for="email">Email</label>
            <input id="email" placeholder="jane@example.com" required type="email">

            <label for="password">Password</label>
            <input id="password" required type="password">

            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" required type="password">

            <label for="phone">Phone</label>
            <input id="phone" placeholder="(xxx) - xxx - xxxx" type="tel">

            <label for="libraryCard">Library card (ID)</label>
            <input id="libraryCard" placeholder="Optional: existing card #" type="text">

            <!-- NEW: account type selector -->
            <label for="accountType">Account type</label>
            <select aria-label="Account type" id="accountType">
                <option selected value="member">Member</option>
                <option value="admin">Admin</option>
            </select>

            <button id="createBtn">Create user</button>

            <div aria-live="polite" class="msg" id="createMsg"></div>
        </div>

        <!-- Modify user -->
        <div class="user-box">
            <h2>Modify user</h2>
            <p class="hint">Modify/Delete an account by its Account ID.</p>

            <label for="modifyAccountId">Account ID</label>
            <input id="modifyAccountId" placeholder="e.g. 12" type="number">

            <button id="searchBtn">Search</button>
            <!-- <button id="deleteBtn">Delete user</button> -->
            <div id="modifyAccountDiv" style="padding: 10px">
                <label for="modifyFullName">Full Name</label>
                <input id="modifyFullName" type="text" required>

                <label for="modifyEmail">Email</label>
                <input id="modifyEmail" type="text" required>

                <label for="modifyPassword">Password (leave blank to keep current)</label>
                <input id="modifyPassword" type="password">

                <label for="modifyPhone">Phone Number</label>
                <input id="modifyPhone" type="text" required>

                <label for="modifyAccountType">Account type</label>
                <select aria-label="Account type" id="modifyAccountType">
                    <option selected value="member">Member</option>
                    <option value="admin">Admin</option>
                </select>

                <div class="button-group">
                    <button id="updateBtn" type="submit">Update</button>
                    <button class="delete" id="deleteBtn" type="button">Delete</button>
                </div>
            </div>

            <div aria-live="polite" class="msg" id="modifyMsg"></div>
        </div>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    // Primary endpoints (adjust if your backend uses different routes)
    const PRIMARY_REGISTER = 'http://localhost:8080/register';     // common custom register route
    const FALLBACK_CREATE_ACCOUNT = 'http://localhost:8080/account'; // fallback endpoint if register isn't available
    const DELETE_ACCOUNT_BASE = 'http://localhost:8080/account'; // DELETE /account/{id}

    async function signOut() {
        try {
            await fetch('/logout', {method: 'POST', credentials: 'include'});
        } catch (err) {
            console.warn('Logout request failed:', err);
        }
        window.location.href = 'AccountLogin.html';
    }

    // helper to set message text and color
    function setMessage(el, text, color) {
        if (!el) return;
        el.style.color = color || '#333';
        el.textContent = text || '';
    }

    // Create user
    document.getElementById('createBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        const btn = e.currentTarget;
        const msgEl = document.getElementById('createMsg');

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const phone = document.getElementById('phone').value.trim();
        const libraryCard = document.getElementById('libraryCard').value.trim();
        const accountType = document.getElementById('accountType').value; // NEW: selected role

        setMessage(msgEl, '', '#333');

        if (!fullName || !email || !password || !confirmPassword) {
            setMessage(msgEl, 'Please fill the required fields.', 'crimson');
            return;
        }
        if (password !== confirmPassword) {
            setMessage(msgEl, 'Passwords do not match.', 'crimson');
            return;
        }

        // if admin is selected, confirm it's intentional
        if (accountType === 'admin') {
            const ok = confirm('You selected Admin. Are you sure you want to create an admin account?');
            if (!ok) return;
        }

        // prepare payload that matches Account entity field names
        const payload = {
            // If your backend's Account entity uses a different field name (e.g. "password"),
            // update this key accordingly.
            passwordHash: password,
            accountType: accountType, // sends 'member' or 'admin'
            notificationEmail: email,
            phoneNumber: phone || null,
            fullName: fullName,
            libraryCard: libraryCard || null
        };

        // disable button while request in flight
        btn.disabled = true;
        btn.textContent = 'Creating...';

        try {
            // try primary register endpoint first
            let res = await fetch(PRIMARY_REGISTER, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify(payload)
            });

            // If primary endpoint returns 404 or 405, try fallback
            if (res.status === 404 || res.status === 405) {
                res = await fetch(FALLBACK_CREATE_ACCOUNT, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });
            }

            if (res.ok) {
                // Try to parse returned json for extra info
                let info = '';
                try {
                    const json = await res.json();
                    if (json && (json.accountId || json.id || json.account_id)) {
                        info = ` (ID: ${json.accountId || json.id || json.account_id})`;
                    }
                } catch (_) { /* ignore parse errors */
                }

                setMessage(msgEl, 'User created successfully' + info + '.', 'green');

                // clear inputs
                document.getElementById('fullName').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('confirmPassword').value = '';
                document.getElementById('phone').value = '';
                document.getElementById('libraryCard').value = '';
                document.getElementById('accountType').value = 'member';
            } else {
                // try to read text or json error message
                let text = '';
                try {
                    text = await res.text();
                } catch (err) {
                    text = res.statusText || String(res.status);
                }
                setMessage(msgEl, 'Failed: ' + (text || res.statusText || res.status), 'crimson');
            }
        } catch (err) {
            setMessage(msgEl, 'Network error: ' + err.message, 'crimson');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Create user';
        }
    });

    // to check if currently modified user is member or admin
    let modifyingUserCurrentRole = "member";

    // Search btn event
    document.getElementById('searchBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await searchUser()
    })

    // Search user
    async function searchUser(){
        let modifyAccountIdfield = document.getElementById('modifyAccountId');
        let modifyMsgField = document.getElementById('modifyMsg');
        let btn = document.getElementById('searchBtn');

        setMessage(modifyMsgField, '', '');

        // Search account
        if(btn.textContent === "Search") {
            btn.textContent = 'Searching...';
            btn.disabled = true;

            // actual search
            const res = await fetch("account/" + modifyAccountIdfield.value);
            if(!res.ok){ // search fails
                const error = await res.text();
                setMessage(modifyMsgField, error, "red");
                btn.textContent = 'Search';
                btn.disabled = false;
            } else{ // search ok
                const result = await res.json();
                console.log(result.fullName);
                let modifyFullName = document.getElementById('modifyFullName');
                let modifyEmail = document.getElementById('modifyEmail');
                let modifyPhone = document.getElementById('modifyPhone');
                let modifyAccountType = document.getElementById('modifyAccountType');

                btn.textContent = "Reset Search";
                btn.disabled = false;
                modifyAccountIdfield.disabled = true;
                setUserInfoFormState("Enabled");

                modifyFullName.value = result.fullName;
                modifyEmail.value = result.notificationEmail;
                modifyPhone.value = result.phoneNumber;
                modifyAccountType.value = result.accountType;
                modifyingUserCurrentRole = result.accountType;
            }
        } else{ // Reset search
            btn.textContent = 'Search';
            btn.disabled = false;
            modifyAccountIdfield.value = '';
            modifyAccountIdfield.disabled = false;
            modifyMsgField.disabled = false;
            setMessage(modifyMsgField, '');
            setUserInfoFormState("Disabled");
        }
    }

    // update button event
    document.getElementById('updateBtn').addEventListener('click', async (e) => {
        e.preventDefault();

        await updateUser();
    })

    async function updateUser(){
        let modifyAccountIdfield = document.getElementById('modifyAccountId');
        let modifyFullName = document.getElementById('modifyFullName');
        let modifyEmail = document.getElementById('modifyEmail');
        let modifyPassword = document.getElementById('modifyPassword');
        let modifyPhone = document.getElementById('modifyPhone');
        let modifyAccountType = document.getElementById('modifyAccountType');
        let modifyMsg = document.getElementById('modifyMsg');

        if(modifyFullName.value === '' || modifyEmail.value === '' || modifyPhone.value === ''){
            setMessage(modifyMsg, "Please fill in all required fields.", "crimson");
            return;
        }

        // if promoting user to admin
        if(modifyAccountType.value === 'admin' && modifyAccountType.value !== modifyingUserCurrentRole){
            const ok = confirm('You are promoting this user to Admin. Do you want to proceed?');
            if (!ok) return;
        }

        // if demoting user to member
        if(modifyAccountType.value === 'member' && modifyAccountType.value !== modifyingUserCurrentRole){
            const ok = confirm('You are demoting this user to Member. Do you want to proceed?');
            if (!ok) return;
        }

        const userInfo = {
            accountId: modifyAccountIdfield.value,
            fullName: modifyFullName.value,
            notificationEmail: modifyEmail.value,
            phoneNumber: modifyPhone.value,
            // send passwordHash only if user entered a value (server will ignore empty)
            passwordHash: modifyPassword.value || null,
            accountType: modifyAccountType.value
        };

        // update
        const response = await fetch("/account", {
            method: "PUT",
            credentials: "include",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(userInfo)
        });

        if(!response.ok){
            const error = await response.text();
            setMessage(modifyMsg, error, "crimson");
            return;
        }

        setMessage(modifyMsg, "Account successfully updated", "green");
        setUserInfoFormState("Disabled");
    }

    function setUserInfoFormState(state){
        let modifyFullName = document.getElementById('modifyFullName');
        let modifyEmail = document.getElementById('modifyEmail');
        let modifyPassword = document.getElementById('modifyPassword');
        let modifyPhone = document.getElementById('modifyPhone');
        let modifyAccountType = document.getElementById('modifyAccountType');
        let updateBtn = document.getElementById('updateBtn');
        let deleteBtn = document.getElementById('deleteBtn');

        if(state === "Enabled"){
            modifyFullName.disabled = false;
            modifyEmail.disabled = false;
            modifyPassword.disabled = false;
            modifyPhone.disabled = false;
            modifyAccountType.disabled = false;
            updateBtn.disabled = false;
            deleteBtn.disabled = false;
        } else {
            modifyFullName.disabled = true;
            modifyFullName.value = "";
            modifyEmail.disabled = true;
            modifyEmail.value = "";
            modifyPassword.disabled = true;
            modifyPassword.value = "";
            modifyPhone.disabled = true;
            modifyPhone.value = "";
            modifyAccountType.disabled = true;
            updateBtn.disabled = true;
            deleteBtn.disabled = true;
            modifyingUserCurrentRole = "member";
        }

    }

    // Delete user
    document.getElementById('deleteBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        const btn = e.currentTarget;
        const msgEl = document.getElementById('modifyMsg');
        const id = document.getElementById('modifyAccountId').value.trim();

        setMessage(msgEl, '', '#333');

        if (!id) {
            setMessage(msgEl, 'Please enter an Account ID.', 'crimson');
            return;
        }

        if (!confirm(`Delete account ${id}? This cannot be undone without recreating the account.`)) {
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Deleting...';

        try {
            const res = await fetch(`${DELETE_ACCOUNT_BASE}/${encodeURIComponent(id)}`, {
                method: 'DELETE',
                credentials: 'include'
            });

            if (res.ok || res.status === 204) {
                setMessage(msgEl, 'User deleted.', 'green');
                document.getElementById('modifyAccountId').value = '';
            } else {
                let text = '';
                try {
                    text = await res.text();
                } catch (_) { /* ignore */
                }
                setMessage(msgEl, 'Failed: ' + (text || res.statusText || res.status), 'crimson');
            }
        } catch (err) {
            setMessage(msgEl, 'Network error: ' + err.message, 'crimson');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Delete user';
        }
    });

    async function applyRoleToNav() {
        try {
            const res = await fetch('/account/current', {credentials: 'include'});
            if (!res.ok) {
                // not authenticated or error -> hide admin links
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                return;
            }
            const me = await res.json();
            const accountType = (me.accountType || '').toString().trim();
            // case-insensitive check for admin
            const isAdmin = accountType.toLowerCase() === 'admin';
            if (!isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            }
        } catch (err) {
            console.warn('applyRoleToNav error:', err);
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    }

    document.addEventListener('DOMContentLoaded', applyRoleToNav);
    document.addEventListener('DOMContentLoaded', setUserInfoFormState("Disabled"));
</script>
</body>
</html>
