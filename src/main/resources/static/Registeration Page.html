<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Account Registration</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .register-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            text-align: left;
        }

        .register-box label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .register-box input[type="text"],
        .register-box input[type="email"],
        .register-box input[type="password"],
        .register-box input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .register-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-size: 1em;
        }

        .register-box button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="Homepage.html">Home</a>
    <a href="catalog_page.html">Catalog</a>
    <a href="borrow page.html">Borrow</a>
    <a href="Place Hold.html">Hold</a>
    <a href="Payment page.html">Payment</a>
    <a href="Account Login.html">Account</a>
    <a href="index.html">Reports</a>
    <a href="Admin Page.html">Admin</a>
</nav>

<main>
    <div class="section-title">Account Registration Form</div>

    <div class="register-box">
        <form id="registerForm">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" placeholder="Enter your full name" required type="text">

            <label for="email">Email</label>
            <input id="email" name="email" placeholder="Enter your email" required type="email">

            <label for="password">Password</label>
            <input id="password" name="password" placeholder="Enter password" required type="password">

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required type="password">

            <label for="phone">Phone Number</label>
            <input id="phone" name="phone" placeholder="(xxx) - xxx - xxx" required type="tel">

            <label for="libraryCard">Library Card</label>
            <input id="libraryCard" name="libraryCard" placeholder="Enter Library Card ID" required type="text">

            <button type="submit">Register</button>
        </form>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    document.getElementById("registerForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const fullname = document.getElementById("fullname").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirmPassword = document.getElementById("confirmPassword").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const libraryCard = document.getElementById("libraryCard").value.trim();

        // Password check
        if (password !== confirmPassword) {
            alert("Passwords do not match!");
            return;
        }

        const userData = {
            fullName: fullname,
            email: email,
            password: password,
            phone: phone,
            libraryCard: libraryCard
        };

        try {
            const response = await fetch("http://localhost:8080/api/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                alert("Registration successful!");
                document.getElementById("registerForm").reset();
            } else {
                alert("Registration failed. Please try again or check your details.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    });
</script>
</body>
</html>
