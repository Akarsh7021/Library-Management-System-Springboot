<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Borrow</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('gabriel-sollmann-Y7d265_7i08-unsplash.jpg') no-repeat center center/cover;
            backdrop-filter: contrast(20%) brightness(1.7);
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .borrow-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 400px;
        }

        .borrow-box h2 {
            color: #0077b6;
            margin-bottom: 20px;
        }

        .borrow-box label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .borrow-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .borrow-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .borrow-box button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="EditUserInformation.html">Account</a>
    <a class="admin-only" href="AdminPage.html">Admin</a>
    <a onclick="signOut()" style="margin-left:12px; color:#d9534f;">Sign Out</a>
</nav>

<main>
    <div class="section-title">Borrow A Book</div>

    <div class="form-container">
        <div class="borrow-box">
            <h2>Borrow Book</h2>
            <form id="borrowForm" onsubmit="borrowBook(event)">
                <label for="bookId">Book ID</label>
                <input id="bookId" name="bookId" placeholder="Enter Book ID" required type="number">

                <label for="accountId">Account ID</label>
                <input id="accountId" name="accountId" placeholder="Enter Account ID" required type="number">

                <label for="dueDate">Due Date</label>
                <input id="dueDate" name="dueDate" required type="date">
                <label id="borrowStat" style="display: none"></label>
                <button type="submit">Borrow</button>
            </form>
        </div>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    // --- Function to handle Borrow Book form submission ---
    function borrowBook(event) {
        event.preventDefault(); // Prevents page reload

        const bookIdRaw = document.getElementById("bookId").value.trim();
        const accountIdRaw = document.getElementById("accountId").value.trim();
        const dueDate = document.getElementById("dueDate").value;

        if (!bookIdRaw || !accountIdRaw || !dueDate) {
            alert("Please fill out all fields before submitting.");
            return;
        }

        // Convert to integers
        const bookId = parseInt(bookIdRaw, 10);
        const accountId = parseInt(accountIdRaw, 10);

        if (isNaN(bookId) || isNaN(accountId)) {
            alert("Book ID and Account ID must be valid integers.");
            return;
        }

        // Log collected and converted data for debugging
        console.log("Borrow Request:", {bookId, accountId, dueDate});

        const requestData = {
            serialBarcodeBookCopy: bookId,
            accountIdAccount: accountId,
            dueDate: dueDate
        };

        console.log("Payload sent to server:", requestData);

        // prep label to report status
        var labelBorrowStat = document.getElementById("borrowStat");

        // Fetch call to backend API
        fetch("http://localhost:8080/borrow", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(requestData)
        })
            .then(async response => {
                if (response.status === 400) { // if a check fails for book copy or account
                    labelBorrowStat.style.display = "block";
                    labelBorrowStat.style.color = "red";
                    labelBorrowStat.innerHTML = await response.text();
                } else if (response.status === 201) { // if status is ok
                    labelBorrowStat.style.display = "block";
                    labelBorrowStat.style.color = "green";
                    labelBorrowStat.innerHTML = await response.text();
                } else if (!response.ok) { // catch other errors
                    throw new Error('HTTP error! status:' + response.status)
                }
            })

                .catch(error => {
                console.error("Error:", error);
                alert("Unable to connect to server or request failed.");
            });

        // Reset form after submission
        document.getElementById("borrowForm").reset();
    }

    async function signOut() {
        try {
            // Call logout on server
            await fetch("/logout", {method: "POST", credentials: "include"});
        } catch (err) {
            console.warn("Logout request failed:", err);
        }
        // Redirect to login page
        window.location.href = "AccountLogin.html";
    }


    async function applyRoleToNav() {
        try {
            const res = await fetch('/account/current', {credentials: 'include'});
            if (!res.ok) {
                // not authenticated or error -> hide admin links
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
                return;
            }
            const me = await res.json();
            const accountType = (me.accountType || '').toString().trim();
            // case-insensitive check for admin
            const isAdmin = accountType.toLowerCase() === 'admin';
            if (!isAdmin) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            } else {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
            }
        } catch (err) {
            console.warn('applyRoleToNav error:', err);
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
        }
    }

    async function applyDefaultBorrowTime() {
        let dueDateField = document.getElementById("dueDate");
        let dueDateVal = new Date();
        try {
            const res = await fetch('/config/defaultBorrowTime');

            if(!res.ok) {
                let errMsg = await res.text();
                console.log("Error loading default Borrow Time: " + errMsg);
                dueDateField.valueAsDate = dueDateVal;
                return;
            }

            const result = await res.json();
            const defaultBorrowTime = parseInt(result.configValue);

            // update the due date field
            dueDateVal.setDate(dueDateVal.getDate() + defaultBorrowTime);
            dueDateField.valueAsDate = dueDateVal;

        } catch (err) {
            console.warn('applyDefaultBorrowTime error:', err);
            dueDateField.valueAsDate = dueDateVal;
        }
    }

    document.addEventListener('DOMContentLoaded', applyRoleToNav);
    document.addEventListener('DOMContentLoaded', applyDefaultBorrowTime);
</script>
</body>
</html>
