<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>City Library | Borrow</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafc;
            color: #333;
        }

        header {
            background-color: #ffffff;
            padding: 10px 40px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.5em;
            margin: 0;
            color: #000;
        }

        nav {
            background-color: #ffffff;
            display: flex;
            justify-content: flex-start;
            gap: 30px;
            padding: 12px 40px;
            border-bottom: 1px solid #e0e0e0;
        }

        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #0077b6;
        }

        main {
            padding: 40px 80px;
            max-width: 1200px;
            margin: auto;
            text-align: center;
        }

        .section-title {
            font-size: 1.8em;
            color: #0077b6;
            margin-bottom: 30px;
            border-left: 4px solid #0077b6;
            padding-left: 10px;
            text-align: left;
        }

        .form-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .borrow-box {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 30px;
            width: 400px;
        }

        .borrow-box h2 {
            color: #0077b6;
            margin-bottom: 20px;
        }

        .borrow-box label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .borrow-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1em;
            outline: none;
        }

        .borrow-box button {
            background-color: #0077b6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .borrow-box button:hover {
            background-color: #005f8c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #e0e0e0;
            margin-top: 60px;
        }
    </style>
</head>
<body>
<header>
    <h1>City Library</h1>
</header>

<nav>
    <a href="HomePage.html">Home</a>
    <a href="CatalogPage.html">Catalog</a>
    <a href="BorrowPage.html">Borrow</a>
    <a href="PlaceHold.html">Hold</a>
    <a href="PaymentPage.html">Payment</a>
    <a href="AccountLogin.html">Account</a>
    <a href="LibraryReportsDashboard.html">Reports</a>
    <a href="AdminPage.html">Admin</a>
</nav>

<main>
    <div class="section-title">Borrow A Book</div>

    <div class="form-container">
        <div class="borrow-box">
            <h2>Borrow Book</h2>
            <form id="borrowForm" onsubmit="borrowBook(event)">
                <label for="bookId">Book ID</label>
                <input id="bookId" name="bookId" placeholder="Enter Book ID" required type="text">

                <label for="accountId">Account ID</label>
                <input id="accountId" name="accountId" placeholder="Enter Account ID" required type="text">

                <label for="dueDate">Due Date</label>
                <input id="dueDate" name="dueDate" required type="date">

                <button type="submit">Borrow</button>
            </form>
        </div>
    </div>
</main>

<footer>
    © 2025 City Library
</footer>

<script>
    // --- Function to handle Borrow Book form submission ---
    function borrowBook(event) {
        event.preventDefault(); // Prevents page reload

        const bookId = document.getElementById("bookId").value.trim();
        const accountId = document.getElementById("accountId").value.trim();
        const dueDate = document.getElementById("dueDate").value;

        if (!bookId || !accountId || !dueDate) {
            alert("Please fill out all fields before submitting.");
            return;
        }

        // Log collected data for debugging
        console.log("Borrow Request:", {bookId, accountId, dueDate});

        // Create request payload
        const requestData = {
            bookId: bookId,
            accountId: accountId,
            dueDate: dueDate
        };

        // Simulated fetch call to backend API
        fetch("http://localhost:8080/api/borrow", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(requestData)
        })
            .then(response => {
                console.log("Response from server:", response);
                alert("Borrow request sent! (This will update records when the backend is ready)");
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Unable to connect to server.");
            });

        // Reset form after submission
        document.getElementById("borrowForm").reset();
    }
</script>
</body>
</html>
